<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Percetakan Cepat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- PWA Support -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Percetakan">
<meta name="theme-color" content="#1a56db">
<meta name="mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-print"></i>
                <span>Percetakan Cepat</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="order.html" class="nav-item">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Pesanan Baru</span>
                </a>
                <a href="riwayat.html" class="nav-item">
                    <i class="fas fa-history"></i>
                    <span>Riwayat</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <h1>Dashboard</h1>
                <div class="date-time" id="dateTime"></div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-receipt"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalTransaksi">0</h3>
                        <p>Total Transaksi Hari Ini</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalPendapatan">Rp 0</h3>
                        <p>Total Pendapatan</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalPelanggan">0</h3>
                        <p>Jumlah Pelanggan</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="produkTerlaris">-</h3>
                        <p>Produk Terlaris</p>
                    </div>
                </div>
            </div>

            <!-- Recent Transactions -->
            <div class="recent-section">
                <h2><i class="fas fa-clock"></i> Transaksi Terbaru</h2>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>No. Transaksi</th>
                                <th>Tanggal</th>
                                <th>Pelanggan</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="recentTransaksi">
                            <tr><td colspan="4" style="text-align: center;">Belum ada transaksi</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <!-- Splash Screen -->
<div class="splash-screen" id="splashScreen">
    <div class="splash-content">
        <i class="fas fa-print"></i>
        <h1>Percetakan Cepat</h1>
        <p>Aplikasi Kasir Percetakan</p>
    </div>
</div>

<script>
    // Hide splash screen after load
    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splashScreen');
            if (splash) splash.remove();
        }, 1500);
    });
</script>

    <script src="script.js"></script>
</body>
</html>
