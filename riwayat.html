<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat - Percetakan Cepat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-print"></i>
                <span>Percetakan Cepat</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="order.html" class="nav-item">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Pesanan Baru</span>
                </a>
                <a href="riwayat.html" class="nav-item active">
                    <i class="fas fa-history"></i>
                    <span>Riwayat</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>Riwayat Transaksi</h1>
                <button class="btn-secondary" id="hapusSemuaBtn">
                    <i class="fas fa-trash-alt"></i> Hapus Semua
                </button>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>No. Transaksi</th>
                            <th>Tanggal</th>
                            <th>Pelanggan</th>
                            <th>Total Item</th>
                            <th>Grand Total</th>
                            <th>Metode</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="riwayatTableBody">
                        <tr><td colspan="7" style="text-align: center;">Belum ada transaksi</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal Detail Transaksi -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detail Transaksi</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn-primary" id="cetakNotaBtn">Cetak Nota</button>
                <button class="btn-secondary" id="tutupModalBtn">Tutup</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
